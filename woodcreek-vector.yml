# =============================================================================
# WOODCREEK VECTOR DATABASE STACK
# Milvus GPU-accelerated vector database with etcd metadata store
#
# Usage:
#   docker compose -f woodcreek-vector.yml up -d
#   docker compose -f woodcreek-vector.yml down
#
# Note: Minio is shared with main stack, must be running first
# =============================================================================

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    container_name: woodcreek-etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - woodcreek_net

  milvus:
    image: milvusdb/milvus:v2.5.2-gpu
    container_name: woodcreek-milvus
    restart: unless-stopped
    depends_on:
      etcd:
        condition: service_healthy
    environment:
      ETCD_ENDPOINTS: woodcreek-etcd:2379
      MINIO_ADDRESS: woodcreek-minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: woodcreek-milvus
      KNOWHERE_GPU_MEM_POOL_SIZE: "4096"
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19531:19530"
      - "9191:9091"
    command: ["milvus", "run", "standalone"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - woodcreek_net

volumes:
  etcd_data:
  milvus_data:

networks:
  woodcreek_net:
    name: woodcreek_net
    external: true

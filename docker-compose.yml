services:
  # =============================================================================
  # TRAEFIK - Reverse Proxy for woodcreek.ai
  # =============================================================================
  
  traefik:
    image: traefik:v3.2
    container_name: woodcreek-traefik
    restart: unless-stopped
    environment:
      - CLOUDFLARE_EMAIL=${CLOUDFLARE_EMAIL}
      - CLOUDFLARE_DNS_API_TOKEN=${CLOUDFLARE_DNS_API_TOKEN}
    ports:
      - "100.71.224.45:8880:80"
      - "100.71.224.45:8443:443"
      - "100.71.224.45:8881:8080"  # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./infra/traefik/acme.json:/acme.json
    networks:
      - woodcreek_net

  # =============================================================================
  # CLOUDFLARED - Tunnel to Cloudflare
  # =============================================================================

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: woodcreek-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - traefik
    networks:
      - woodcreek_net

  # =============================================================================
  # WOODCREEK AGENTS API
  # =============================================================================
  
  agents-api:
    build:
      context: ./dacribagents-api
      dockerfile: Dockerfile
    container_name: woodcreek-agents-api
    restart: unless-stopped
    volumes:
      - sqlite_data:/app/data
    environment:
      # LLM — Tailscale-internal vLLM endpoints only
      LLM_PROVIDER: local
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://100.71.224.45:8000/v1}
      VLLM_MODEL_NAME: ${VLLM_MODEL_NAME:-nvcr-gpt-oss-20b}
      VLLM_ROUTER_BASE_URL: ${VLLM_ROUTER_BASE_URL:-http://100.65.183.110:8000/v1}
      VLLM_ROUTER_MODEL_NAME: ${VLLM_ROUTER_MODEL_NAME:-vllm-mistral-7b}
      VLLM_TOOL_PLANNER_BASE_URL: ${VLLM_TOOL_PLANNER_BASE_URL:-http://100.71.224.45:8001/v1}
      VLLM_TOOL_PLANNER_MODEL_NAME: ${VLLM_TOOL_PLANNER_MODEL_NAME:-qwen2.5-14b-instruct}
      AGENT_TEMPERATURE: ${AGENT_TEMPERATURE:-0.1}
      ENABLE_LLM_TOOL_BINDING: ${ENABLE_LLM_TOOL_BINDING:-false}
      # Infrastructure
      MILVUS_HOST: 100.103.47.127
      MILVUS_PORT: 19530
      POSTGRES_HOST: woodcreek-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: woodcreek
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: woodcreek_agents
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      LANGGRAPH_ENABLED: ${LANGGRAPH_ENABLED:-false}
      # Reminder platform
      TELNYX_API_KEY: ${TELNYX_API_KEY}
      TELNYX_FROM_NUMBER: ${TELNYX_FROM_NUMBER}
      SMS_INGEST_SECRET: ${SMS_INGEST_SECRET}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      SLACK_DELIVERY_CHANNEL: ${SLACK_DELIVERY_CHANNEL}
      SMTP_HOST: ${SMTP_HOST:-smtp.mail.us-east-1.awsapps.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-reminders@woodcreek.me}
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
      KAFKA_TOPIC_EVENTS: ${KAFKA_TOPIC_EVENTS:-woodcreek.events.v1}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-woodcreek-reminder-group}
      WORKMAIL_EWS_EMAIL: ${WORKMAIL_EWS_EMAIL}
      WORKMAIL_EWS_PASSWORD: ${WORKMAIL_EWS_PASSWORD}
      WORKMAIL_EWS_REGION: ${WORKMAIL_EWS_REGION:-us-east-1}
      LATTICE_DATABASE_URL: ${LATTICE_DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - woodcreek_net

  # =============================================================================
  # MINIO - Object Storage (shared by Milvus and Lattice)
  # =============================================================================

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: woodcreek-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: minio server /data --console-address ":9001"
    ports:
      - "100.71.224.45:9102:9000"
      - "100.71.224.45:9101:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - woodcreek_net

  # =============================================================================
  # POSTGRESQL - LangGraph Checkpoints & App State
  # =============================================================================
  
  postgres:
    image: postgres:16-alpine
    container_name: woodcreek-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: woodcreek
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: woodcreek_agents
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "100.71.224.45:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woodcreek -d woodcreek_agents"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - woodcreek_net
  # =============================================================================
  # EMAIL WORKER - Multi-Mailbox Email Ingestion Service
  # All WORKMAIL_* and KAFKA_* config loaded from .env
  # To add a mailbox: update WORKMAIL_MAILBOXES and add WORKMAIL_{NAME}_* vars in .env
  # =============================================================================
  email-worker:
    build:
      context: ./dacribagents-api
      dockerfile: Dockerfile
    container_name: woodcreek-email-worker
    restart: unless-stopped
    command: python -m dacribagents.cli.email_worker_lattice
    env_file: .env
    environment:
      # Remap LATTICE_MINIO_* to MINIO_* for publisher compatibility
      MINIO_ENDPOINT: ${LATTICE_MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${LATTICE_MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${LATTICE_MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${LATTICE_MINIO_BUCKET}
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline | grep -q email_worker_lattice"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - woodcreek_net
    # No depends_on needed - we're publishing to external Kafka, not local services

  # ---------------------------------------------------------------------------
  # Backfill Job (run manually, not continuously)
  # Usage: docker compose --profile backfill run email-backfill
  # ---------------------------------------------------------------------------
  email-backfill:
    build:
      context: ./dacribagents-api
      dockerfile: Dockerfile
    container_name: woodcreek-email-backfill
    profiles: ["backfill"]
    command: >
      python -m dacribagents.cli.email_worker_lattice_backfill
      --mailbox ${BACKFILL_MAILBOX:-agents}
      --folder ${BACKFILL_FOLDER:-INBOX}
      --limit ${BACKFILL_LIMIT:-100}
    env_file: .env
    networks:
      - woodcreek_net

volumes:
  traefik_certs:
  minio_data:
  postgres_data:
  sqlite_data:

networks:
  woodcreek_net:
    name: woodcreek_net
    driver: bridge